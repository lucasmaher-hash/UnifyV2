<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unify — Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=16">
  <link rel="stylesheet" href="settings.css?v=11">
</head>
<body>
  <div class="phone-stage">
  <div class="phone phone--cream" data-screen="settings-account">
    <div class="settings-screen">

      <!-- ================= BACK HEADER ================= -->
      <div class="settings-sub-header">
        <a class="settings-back" href="settings.html">
          <img class="settings-back__icon" src="assets/icon_back_chevron.svg" alt="">
          <span class="settings-back__label">account</span>
        </a>
      </div>

      <!-- ================= PANEL ================= -->
      <div class="settings-panel settings-panel--account">
        <img class="settings-panel__figur" src="assets/nav_figur_peek.svg" alt="" aria-hidden="true">

        <div class="settings-account-info">
          <div class="settings-account-list">
            <p class="settings-account-list__name">lucas maher</p>
            <p>industrie design</p>
            <p>3. semester</p>
            <p>gruppe a</p>
            <p>lucas.maher@hm.edu</p>
            <p class="settings-account-list__id">334458739</p>
          </div>

          <div class="settings-account-pillgroup">
            <div class="settings-account-pill">
              <p class="settings-account-pill__label">matrikulationsnummer</p>
              <button class="settings-account-pill__edit" type="button" aria-label="Matrikulationsnummer bearbeiten">
                <img src="assets/icon_edit_pencil.svg" alt="">
              </button>
            </div>
            <p class="settings-account-help">Das Ändern deiner Matrikulationsnummer aktuallisiert automatisch den dazugehörigen Acconut</p>
          </div>
        </div>

        <nav class="settings-nav" aria-label="Primary">
          <a class="settings-nav__btn" href="index.html" aria-label="Home"><img src="assets/icon_home_outline.svg" alt=""></a>
          <a class="settings-nav__btn" href="stundenplan.html" aria-label="Calendar"><img src="assets/icon_calendar.svg" alt=""></a>
          <a class="settings-nav__btn" href="map.html" aria-label="Map"><img src="assets/icon_pin.svg" alt=""></a>
          <button class="settings-nav__btn" type="button" aria-label="Settings" aria-current="page"><img src="assets/icon_star_filled.svg" alt=""></button>
        </nav>
      </div>

    </div>
  </div>
  </div>

  <script>
    // Scale the phone down so the whole 402×874 frame always fits the window.
    (function () {
      var MARGIN = 40;
      function fit() {
        var s = Math.min(1, (window.innerHeight - MARGIN) / 874, (window.innerWidth - MARGIN) / 402);
        document.documentElement.style.setProperty('--scale', s);
      }
      fit();
      window.addEventListener('resize', fit);
    })();

    // ===================== Bottom nav: bounce feedback =====================
    // Played on LOAD for whichever icon is aria-current="page" — not on click
    // of a link that navigates away (races the page unload — see styles.css).
    (function () {
      var current = document.querySelector('.settings-nav__btn[aria-current="page"]');
      if (current) current.classList.add('nav-bounce');

      document.querySelectorAll('.settings-nav__btn:not([href])').forEach(function (btn) {
        btn.addEventListener('click', function () {
          btn.classList.remove('nav-bounce');
          void btn.offsetWidth;
          btn.classList.add('nav-bounce');
        });
      });
    })();

    // Edit matrikulationsnummer: placeholder tap feedback only — no edit flow
    // built yet.
    (function () {
      var btn = document.querySelector('.settings-account-pill__edit');
      if (!btn) return;
      btn.addEventListener('click', function () {
        btn.classList.remove('settings-btn-tap');
        void btn.offsetWidth;
        btn.classList.add('settings-btn-tap');
      });
    })();
  </script>
</body>
</html>
