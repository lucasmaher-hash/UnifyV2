  <script>
    // Types out the hero heading + subtext letter by letter, like Claude's
    // own response-streaming animation: mildly randomized per-character
    // timing (not a robotic fixed interval) and a brief extra pause after
    // commas/exclamation marks so it reads naturally. No blinking cursor —
    // just the text appearing.
    (function () {
      var segments = [
        { el: document.getElementById('tw-line1'), text: 'hallo,' },
        { el: document.getElementById('tw-line2'), text: 'moritz!' },
        { el: document.getElementById('tw-sub1'),  text: '2 Freunde sind verfügbar,' },
        { el: document.getElementById('tw-sub2'),  text: '3 Aktivitäten später' }
      ];
      if (segments.some(function (s) { return !s.el; })) return;

      var BASE_DELAY = 24;    // ms, plus jitter below
      var START_DELAY = 350;  // ms before typing starts

      function delayFor(ch) {
        var d = BASE_DELAY + Math.random() * 20;
        if (ch === ',' || ch === '!') d += 90;
        return d;
      }

      function typeSegment(i) {
        if (i >= segments.length) return; // done
        var seg = segments[i];
        var chars = seg.text.split('');
        var idx = 0;
        (function step() {
          if (idx < chars.length) {
            seg.el.textContent += chars[idx];
            var d = delayFor(chars[idx]);
            idx++;
            setTimeout(step, d);
          } else {
            typeSegment(i + 1); // straight into the next segment, no pause
          }
        })();
      }

      setTimeout(function () { typeSegment(0); }, START_DELAY);
    })();

    // Scale the phone down so the whole 402×874 frame always fits the window.
    (function () {
      var MARGIN = 40; // breathing room around the phone
      function fit() {
        var s = Math.min(
          1,
          (window.innerHeight - MARGIN) / 874,
          (window.innerWidth - MARGIN) / 402
        );
        document.documentElement.style.setProperty('--scale', s);
      }
      fit();
      window.addEventListener('resize', fit);
    })();

    // Scroll-driven expand/collapse: only one card is open at a time, chosen
    // purely by CURRENT scroll position (not accumulated scroll history).
    // This is deliberately position-based rather than a distance-accumulating
    // stepper: a stepper "spends" a fixed budget of scroll distance going
    // forward, but connect_now's own reachable range (~767px, capped by its
    // own open height) is smaller than socials's (~905px) — so a step sized
    // generously enough for socials, when walked backward from the bottom,
    // could run out of budget before reaching scrollTop 0, causing an abrupt
    // jump back to connect instead of socials properly re-opening on the way
    // up. A pure function of scrollTop has no history to run out of: the same
    // position always yields the same open card, so scrolling up naturally
    // re-opens each one in reverse, exactly mirroring the way down.
    (function () {
      var screenEl = document.querySelector('.screen');
      var cards = Array.prototype.slice.call(document.querySelectorAll('.card[data-expand]'));
      if (!screenEl || !cards.length) return;

      // connect_now's own reachable scroll range (while it's the only open
      // card) is normally capped at ~767px by its own open height, so
      // index.html's .scroll-spacer (see styles.css) adds a bit of extra
      // scrollable range purely to keep T1 safely reachable; the same fixed
      // spacer also extends socials's own reachable range (it has no fixed
      // upper threshold and always extends to the true bottom), so its
      // dwell time scales along with T1 automatically. The spacer has been
      // reduced twice since an earlier, larger pass (505px -> 223px -> 178px)
      // to shrink the empty scroll gap that appears after map opens; T1 has
      // stayed at 640 since the second pass.
      var T1 = 640; // connect stays open below this
      // No fixed upper threshold for socials — it stays open for as much of
      // the remaining scroll as physically exists (as generous as possible);
      // the true-bottom check below is what finally hands off to the last
      // card once there's genuinely nowhere further to scroll.

      function update() {
        var st = screenEl.scrollTop;
        var maxScroll = screenEl.scrollHeight - screenEl.clientHeight;
        var target;
        if (st <= 0) {
          target = 0;
        } else if (st >= maxScroll - 1) {
          target = cards.length - 1;
        } else if (st < T1) {
          target = 0;
        } else {
          target = 1;
        }
        cards.forEach(function (card, i) {
          card.classList.toggle('is-open', i === target);
        });
      }

      screenEl.addEventListener('scroll', update, { passive: true });

      update();
    })();

    // Monster's pupils (clean pink ellipses, ry=26, resting at cy=291) track
    // scroll position — translated straight down as the page scrolls. The
    // eye-whites are now clean ellipses (cy=316, ry=59) bottoming out at
    // y=375; at full travel the pupil's bottom edge (cy + ry + CAP = 291 +
    // 26 + 56 = 373) rests ~2px shy of the white's bottom so it visibly
    // touches without any risk of poking past the rounded edge.
    (function () {
      var screenEl = document.querySelector('.screen');
      var pupils = document.querySelectorAll('.monster-pupil');
      if (!screenEl || !pupils.length) return;

      var CAP = 56;   // px of downward travel at full effect
      var RAMP = 400; // px of scroll to reach the full cap

      function update() {
        var t = Math.min(1, Math.max(0, screenEl.scrollTop / RAMP));
        var y = t * CAP;
        pupils.forEach(function (p) {
          p.style.transform = 'translateY(' + y + 'px)';
        });
      }

      screenEl.addEventListener('scroll', update, { passive: true });

      update();
    })();
  </script>
