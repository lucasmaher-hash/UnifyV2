<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unify — Friends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=18">
  <!-- reuses .sp-friend-row (+face/bubble/head/name) from the stundenplan
       friend list — same component (friends_stundenplan_new) in Figma. -->
  <link rel="stylesheet" href="stundenplan.css?v=42">
  <link rel="stylesheet" href="settings.css?v=11">
</head>
<body>
  <div class="phone-stage">
  <div class="phone phone--cream" data-screen="settings-friends">
    <div class="settings-screen">

      <!-- ================= BACK HEADER ================= -->
      <div class="settings-sub-header">
        <a class="settings-back" href="settings.html">
          <img class="settings-back__icon" src="assets/icon_back_chevron.svg" alt="">
          <span class="settings-back__label">friends</span>
        </a>
      </div>

      <!-- ================= PANEL ================= -->
      <div class="settings-panel settings-panel--friends">
        <img class="settings-panel__figur" src="assets/nav_figur_peek.svg" alt="" aria-hidden="true">

        <div class="settings-friends-list">
          <div class="settings-friends-scroll">
            <div class="settings-friends-scroll__body" id="settings-friends-list"></div>
          </div>

          <button class="settings-friends-search" type="button">
            <img class="settings-friends-search__icon" src="assets/icon_search.svg" alt="">
            <span>name / matrikulationsnummer</span>
          </button>
        </div>

        <nav class="settings-nav" aria-label="Primary">
          <a class="settings-nav__btn" href="index.html" aria-label="Home"><img src="assets/icon_home_outline.svg" alt=""></a>
          <a class="settings-nav__btn" href="stundenplan.html" aria-label="Calendar"><img src="assets/icon_calendar.svg" alt=""></a>
          <a class="settings-nav__btn" href="map.html" aria-label="Map"><img src="assets/icon_pin.svg" alt=""></a>
          <button class="settings-nav__btn" type="button" aria-label="Settings" aria-current="page"><img src="assets/icon_star_filled.svg" alt=""></button>
        </nav>
      </div>

    </div>
  </div>
  </div>

  <script>
    // Scale the phone down so the whole 402×874 frame always fits the window.
    (function () {
      var MARGIN = 40;
      function fit() {
        var s = Math.min(1, (window.innerHeight - MARGIN) / 874, (window.innerWidth - MARGIN) / 402);
        document.documentElement.style.setProperty('--scale', s);
      }
      fit();
      window.addEventListener('resize', fit);
    })();

    // ===================== Bottom nav: bounce feedback =====================
    (function () {
      var current = document.querySelector('.settings-nav__btn[aria-current="page"]');
      if (current) current.classList.add('nav-bounce');

      document.querySelectorAll('.settings-nav__btn:not([href])').forEach(function (btn) {
        btn.addEventListener('click', function () {
          btn.classList.remove('nav-bounce');
          void btn.offsetWidth;
          btn.classList.add('nav-bounce');
        });
      });
    })();

    // Render the roster and wire up add/remove interactions.
    (function () {
      var list = document.getElementById('settings-friends-list');
      if (!list) return;

      var FACE_DY = {
        'friend_monster_1.svg': -1,
        'friend_monster_2.svg': -2,
        'friend_monster_3.svg': 0,
        'friend_monster_4.svg': -6,
        'friend_monster_6.svg': 0,
        'friend_monster_7.svg': 1,
        'friend_monster_8.svg': -6,
        'friend_monster_9.svg': -7
      };
      var BUBBLE_LEFT = 47;
      var NAME_X = 83;

      var friends = [
        { name: 'Emil', room: '0.012', monster: 'friend_monster_1.svg', online: true, action: 'remove' },
        { name: 'Yasira', room: '1.104', monster: 'friend_monster_3.svg', bubbleLeft: 57, online: true, action: 'remove' },
        { name: 'Jonas', room: '2.007', monster: 'friend_monster_6.svg', online: true, action: 'remove' },
        { name: 'Lena', room: '0.220', monster: 'friend_monster_8.svg', bubbleLeft: 32, action: 'remove' },
        { name: 'Theo', room: '1.019', monster: 'friend_monster_2.svg', action: 'remove' },
        { name: 'Marlene', room: '2.113', monster: 'friend_monster_9.svg', action: 'remove' }
      ];

      list.innerHTML = friends.map(function (friend) {
        var dy = FACE_DY[friend.monster] || 0;
        var bl = friend.bubbleLeft || BUBBLE_LEFT;
        return '<div class="sp-friend-row settings-friends-row" style="--bubble-left:' + bl + 'px;--name-pad:' + (NAME_X - bl) + 'px">' +
          '<img class="sp-friend-row__face" style="top:' + dy + 'px" src="assets/' + friend.monster + '" alt="">' +
          '<span class="sp-friend-row__bubble">' +
            '<span class="sp-friend-row__head">' +
              '<span class="sp-friend-row__name">' + friend.name + '</span>' +
              '<button class="settings-friend-action settings-friend-action--' + friend.action + '" type="button" aria-label="' + (friend.action === 'add' ? 'Add friend back' : 'Remove friend') + '">' +
                '<img src="assets/' + (friend.action === 'add' ? 'icon_plus_circle.svg' : 'icon_trash.svg') + '" alt="">' +
              '</button>' +
            '</span>' +
          '</span>' +
        '</div>';
      }).join('');

      document.querySelectorAll('.settings-friend-action--remove').forEach(function (btn) {
        btn.addEventListener('click', function (event) {
          event.stopPropagation();
          var row = btn.closest('.sp-friend-row');
          if (row) row.style.display = 'none';
        });
      });
      document.querySelectorAll('.settings-friend-action--add').forEach(function (btn) {
        btn.addEventListener('click', function (event) {
          event.stopPropagation();
          btn.classList.remove('settings-btn-tap');
          void btn.offsetWidth;
          btn.classList.add('settings-btn-tap');
        });
      });
    })();
  </script>
</body>
</html>
