         family (nodes 2304:32069 / 2304:31893). -->

        <p class="map-course-card__info" id="courseCardInfo"></p>

  <script>
    // Scale the phone down so the whole 402×874 frame always fits the window.
    (function () {
      var MARGIN = 40;
      function fit() {
        var s = Math.min(1, (window.innerHeight - MARGIN) / 874, (window.innerWidth - MARGIN) / 402);
        document.documentElement.style.setProperty('--scale', s);
      }
      fit();
      window.addEventListener('resize', fit);
    })();

    // ===================== Zoomable / pannable map =====================
    // Markers live INSIDE the zoomed/panned canvas (so their POSITION tracks
    // the map correctly for free, via the browser's own transform math), but
    // each carries an inverse-scale transform (1/zoom) so their own VISUAL
    // SIZE stays constant on screen regardless of the map's current zoom —
    // only the map art itself gets bigger/smaller, exactly like map pins in
    // a real map app. See .map-marker__inner in map.css.
    (function () {
      var viewport = document.getElementById('mapViewport');
      var canvas = document.getElementById('mapCanvas');
      var bg1F = document.getElementById('mapBg1F');
      var bgGF = document.getElementById('mapBgGF');
      var bg2OG = document.getElementById('mapBg2OG');
      // Courses-tab variants — same wall treatment, plus pink course-room
      // squares baked into the Figma export. Swapped in instead of the
      // friends variant above when the bottom sheet's Courses tab is active.
      var bgGFCourses = document.getElementById('mapBgGFCourses');
      var bg1FCourses = document.getElementById('mapBg1FCourses');
      var bg2OGCourses = document.getElementById('mapBg2OGCourses');
      if (!viewport || !canvas || !bg1F) return;

      var NATURAL_W = 2400, NATURAL_H = 1268; // all three floorplan_*.png share this size

      // The floorplan's background is the same cream as the phone chrome
      // around it, so panning/zooming past its edges is invisible — free rein
      // to extend both how far out you can zoom and how far you can pan past
      // the edges. 0.3 = 30%, shared by both so they feel like one consistent
      // "extra room" rather than two independently-tuned numbers.
      var EDGE_MARGIN = 0.3;

      var scale = 1, minScale = 1, maxScale = 1, x = 0, y = 0;
      // The zoom level the map opens at (set in initScale). Reference point
      // for panToMarkerAnimated below: it zooms IN to this level if the user
      // is more zoomed out than it, but never zooms back OUT past whatever
      // level the user is already at.
      var defaultScale = 1;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function constrain() {
        var w = NATURAL_W * scale, h = NATURAL_H * scale;
        var vw = viewport.clientWidth, vh = viewport.clientHeight;
        // extra slack (in scaled px) on top of the normal "cover" range, so you
        // can pan EDGE_MARGIN worth of the map's own size past any edge before
        // hitting the limit — revealing background, which matches the map bg.
        var marginX = w * EDGE_MARGIN, marginY = h * EDGE_MARGIN;
        var minX = Math.min(0, vw - w) - marginX, maxX = Math.max(0, vw - w) + marginX;
        var minY = Math.min(0, vh - h) - marginY, maxY = Math.max(0, vh - h) + marginY;
        x = clamp(x, minX, maxX);
        y = clamp(y, minY, maxY);
      }

      function render() {
        canvas.style.transform = 'translate(' + x + 'px,' + y + 'px) scale(' + scale + ')';
        canvas.style.transformOrigin = '0 0';
        document.documentElement.style.setProperty('--map-zoom', scale);
        // Below ~20% of the way from min to max zoom, swap the 11 individual
        // figures for the 4 grouped cluster badges (see .map-cluster in map.css)
        // — too zoomed out for individual figures to be legible/useful.
        var zoomPercent = maxScale > minScale ? (scale - minScale) / (maxScale - minScale) : 0;
        canvas.classList.toggle('is-zoomed-out', zoomPercent < 0.20);
        // Read by the GF wall-thickness formula in map.css — a single
        // linear interpolation (0 at min zoom, 1 at max zoom) between the
        // two confirmed endpoint thicknesses, instead of two separate
        // formulas meeting at an arbitrary pivot (which produced a
        // thicker/thinner/thicker hump instead of one smooth curve).
        document.documentElement.style.setProperty('--map-zoom-frac', zoomPercent);
      }

      function setScale(newScale, cx, cy) {
        // cx, cy = viewport-relative point to zoom around (defaults to center)
        if (cx === undefined) cx = viewport.clientWidth / 2;
        if (cy === undefined) cy = viewport.clientHeight / 2;
        var clamped = clamp(newScale, minScale, maxScale);
        var factor = clamped / scale;
        x = cx - (cx - x) * factor;
        y = cy - (cy - y) * factor;
        scale = clamped;
        constrain();
        render();
      }

      function initScale() {
        var vw = viewport.clientWidth, vh = viewport.clientHeight;
        var coverScale = Math.max(vw / NATURAL_W, vh / NATURAL_H); // fills viewport, no gaps
        // Zoom out further than "cover" — down to where the map is ~30% smaller
        // than the viewport on each axis, matching EDGE_MARGIN so min-zoom and
        // max-pan reveal a consistent amount of background. maxScale/initial
        // scale stay anchored to coverScale (not minScale) so this doesn't
        // change the default view or how far in you can zoom.
        minScale = coverScale / (1 + EDGE_MARGIN);
        // 2.8512 = 3.52 * 0.9 * 0.9 — two successive 10% reductions from
        // the original cap (itself 1.6 * 2.2x default, matched against a
        // reference screenshot), so max zoom now reaches 81% as far in.
        maxScale = coverScale * 2.8512;
        defaultScale = coverScale * 1.6;
        // The view a floor/tab switch (or first load) actually opens on is
        // zoomed OUT further than defaultScale — 80% of it — while
        // defaultScale itself stays the reference used elsewhere (the wall-
        // thickness curve's zero point, and the floor never zooming back
        // out past it when panning to a marker/room).
        scale = defaultScale * 0.8;
        // Read by the GF wall-thickness formula in map.css — the two
        // endpoints of the single linear interpolation used there.
        document.documentElement.style.setProperty('--map-zoom-min', minScale);
        document.documentElement.style.setProperty('--map-zoom-default', defaultScale);
        document.documentElement.style.setProperty('--map-zoom-max', maxScale);
        // center on the middle of the map
        x = vw / 2 - (NATURAL_W * scale) / 2;
        y = vh / 2 - (NATURAL_H * scale) / 2;
        constrain();
        render();
      }

      // ---- trackpad: two-finger scroll pans, pinch zooms ----
      // Browsers report BOTH gestures as 'wheel' events — a trackpad pinch
      // is distinguished from a two-finger scroll only by ctrlKey being set
      // true automatically by the browser (the user isn't actually holding
      // Ctrl). A plain mouse wheel (no trackpad) falls into the "pan" branch
      // too, since it likewise doesn't set ctrlKey unless truly held down.
      viewport.addEventListener('wheel', function (e) {
        e.preventDefault();
        if (e.ctrlKey) {
          var rect = viewport.getBoundingClientRect();
          var cx = e.clientX - rect.left, cy = e.clientY - rect.top;
          var delta = -e.deltaY * 0.02; // pinch deltaY is on a smaller scale than a regular scroll
          setScale(scale * (1 + delta), cx, cy);
        } else {
          x -= e.deltaX;
          y -= e.deltaY;
          constrain();
          render();
        }
      }, { passive: false });

      var dragging = false, lastX = 0, lastY = 0;
      viewport.addEventListener('mousedown', function (e) {
        dragging = true; lastX = e.clientX; lastY = e.clientY;
        viewport.classList.add('is-grabbing');
      });
      window.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        x += e.clientX - lastX; y += e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        constrain(); render();
      });
      window.addEventListener('mouseup', function () { dragging = false; viewport.classList.remove('is-grabbing'); });

      // ---- touch: one-finger pan, two-finger pinch zoom ----
      var touchState = null;
      function touchDist(t0, t1) { return Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY); }
      function touchMid(t0, t1, rect) { return { x: (t0.clientX + t1.clientX) / 2 - rect.left, y: (t0.clientY + t1.clientY) / 2 - rect.top }; }

      viewport.addEventListener('touchstart', function (e) {
        var rect = viewport.getBoundingClientRect();
        if (e.touches.length === 1) {
          touchState = { mode: 'pan', lastX: e.touches[0].clientX, lastY: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
          touchState = {
            mode: 'pinch',
            startDist: touchDist(e.touches[0], e.touches[1]),
            startScale: scale,
            mid: touchMid(e.touches[0], e.touches[1], rect)
          };
        }
      }, { passive: true });

      viewport.addEventListener('touchmove', function (e) {
        if (!touchState) return;
        e.preventDefault();
        var rect = viewport.getBoundingClientRect();
        if (touchState.mode === 'pan' && e.touches.length === 1) {
          var t = e.touches[0];
          x += t.clientX - touchState.lastX; y += t.clientY - touchState.lastY;
          touchState.lastX = t.clientX; touchState.lastY = t.clientY;
          constrain(); render();
        } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
          var d = touchDist(e.touches[0], e.touches[1]);
          var factor = d / touchState.startDist;
          setScale(touchState.startScale * factor, touchState.mid.x, touchState.mid.y);
        }
      }, { passive: false });

      viewport.addEventListener('touchend', function (e) {
        if (e.touches.length === 0) touchState = null;
        else if (e.touches.length === 1) touchState = { mode: 'pan', lastX: e.touches[0].clientX, lastY: e.touches[0].clientY };
      });

      window.addEventListener('resize', initScale);
      initScale();

      // Exposed so the floor selector (below) can swap the background image
      // and re-fit/re-center the view on it, and so the bottom sheet's
      // Friends/Courses toggle (see further below) can swap in the
      // pink-square "courses" variant of whichever floor is active.
      var currentFloor = 'GF';
      var currentTab = 'friends';
      function applyBgVisibility() {
        // Driven via inline style, not the `hidden` attribute/property — on
        // these inline SVG root elements .hidden doesn't reliably reflect
        // to/from the "hidden" content attribute in all engines, so the CSS
        // [hidden] selector (and the attribute-based toggle itself) can
        // silently no-op, leaving multiple floors painted stacked on top of
        // each other.
        var isCourses = currentTab === 'courses';
        bgGF.style.display = (!isCourses && currentFloor === 'GF') ? '' : 'none';
        bg1F.style.display = (!isCourses && currentFloor === '1.F') ? '' : 'none';

            room: roomRect.getAttribute('data-room'),
            course: roomRect.getAttribute('data-course'),
            time: roomRect.getAttribute('data-time'),
            people: (roomRect.getAttribute('data-people') || '').split(',').filter(Boolean)
          };
          var leftPct = parseFloat(roomRect.getAttribute('data-left-pct') || '0');
          var topPct = parseFloat(roomRect.getAttribute('data-top-pct') || '0');
          if (window.mapControls && window.mapControls.panToRoomAnimated) {
            window.mapControls.panToRoomAnimated(leftPct, topPct, function () { openCourseCard(room); }, 500);
          } else {
            openCourseCard(room);
          }
          return;
        }
        // Too zoomed out to show individual monsters: tapping the grouped
        // badge just zooms in on that group — no card opens.
        var cluster = e.target.closest('.map-cluster');
        if (cluster) {
          var leftPct = parseFloat(cluster.style.left || '0');
          var topPct = parseFloat(cluster.style.top || '0');
          if (window.mapControls && window.mapControls.zoomToClusterAnimated) {
            window.mapControls.zoomToClusterAnimated(leftPct, topPct, 500);
          }
          return;
        }
        var marker = e.target.closest('.map-marker');
        if (!marker) return;
        var friend = friends.find(function (f) { return f.name === marker.getAttribute('data-friend'); });
        if (!friend) return;
        if (window.mapControls && window.mapControls.panToMarkerAnimated) {
          window.mapControls.panToMarkerAnimated(friend.name, function () { openMonsterCard(friend); }, 500);
        } else {
          openMonsterCard(friend);
        }
      });

      overlay.addEventListener('click', function (e) {
        if (!overlayCard.contains(e.target)) closeMonsterCard();
      });

      // Exposed so the Courses list in the bottom sheet (built further below,
      // after all room data is available) can open a room's card the same
      // way tapping its pink square on the map does.
      window.mapCourseControls = { open: openCourseCard };
    })();

    // ===================== Bottom sheet: Freunde / Kurse toggle =====================
    (function () {
      var buttons = document.querySelectorAll('[data-sheet-tab]');
      var panels = { friends: document.getElementById('sheetFriends'), courses: document.getElementById('sheetCourses') };
      var searchInput = document.getElementById('sheetSearchInput');
      var body = document.getElementById('sheetBody');
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var target = btn.getAttribute('data-sheet-tab');
          buttons.forEach(function (b) { b.classList.toggle('is-active', b === btn); });
          Object.keys(panels).forEach(function (key) { panels[key].hidden = key !== target; });
          // pinned search bar serves both tabs — swap its placeholder
          if (searchInput) searchInput.placeholder = target === 'courses' ? 'search courses' : 'search friends';
          // reset scroll so the new tab starts at the top
          if (body) body.scrollTop = 0;
          // swap the map background to the matching friends/courses variant
          if (window.mapControls && window.mapControls.setTab) window.mapControls.setTab(target);
          // hide/show the monster markers & clusters to match (position/data
          // untouched — just a display toggle, restored exactly on switch-back)
          if (window.mapFriendsControls && window.mapFriendsControls.refresh) window.mapFriendsControls.refresh();
        });
      });
    })();

    // ===================== Bottom sheet: drag (or tap) to expand / collapse =====================
    (function () {
      var sheet = document.getElementById('mapSheet');
      var inner = document.getElementById('mapSheetInner');
      var peek = document.getElementById('sheetPeekBtn');
      if (!sheet || !inner || !peek) return;

      var COLLAPSED_H = 173; // just enough for the toggle + nav — matches the CSS's collapsed max-height
      var EXPANDED_H = 0.64 * 874; // matches the CSS's 64% max-height, against the fixed 874px phone frame
      var body = document.getElementById('sheetBody');

      var dragging = false;
      var moved = false;
      var startY = 0;
      var startH = 0;

      // The Freunde/Kurse list must be fully hidden while collapsed (not just
      // clipped), or a sliver of the top row peeks out above the nav — so
      // toggle it live off the current drag height, not just the final state.
      function updateBodyVisibility(h) {
        if (body) body.style.display = h <= COLLAPSED_H + 10 ? 'none' : '';
      }

      // Settles the sheet to its resting open/closed state with a smooth
      // max-height transition. On close, the list stays visible (forced,
      // overriding the CSS class rule) until the shrink animation finishes,
      // so it looks like the sheet swallows its own content on the way down
      // instead of popping away instantly. On open it's shown right away so
      // growing the sheet reads as the frame extruding upward to reveal it.
      function settle(collapsed) {
        sheet.classList.toggle('is-collapsed', collapsed);
        if (!body) return;
        if (collapsed) {
          body.style.display = 'block';
          var onEnd = function (e) {
            if (e.target !== inner || e.propertyName !== 'max-height') return;
            inner.removeEventListener('transitionend', onEnd);
            if (sheet.classList.contains('is-collapsed')) body.style.display = '';
          };
          inner.addEventListener('transitionend', onEnd);
        } else {
          body.style.display = '';
        }
      }

      function onPointerDown(e) {
        dragging = true;
        moved = false;
        startY = e.clientY;
        startH = sheet.classList.contains('is-collapsed') ? COLLAPSED_H : Math.min(inner.getBoundingClientRect().height, EXPANDED_H);
        inner.classList.add('is-dragging');
        peek.setPointerCapture(e.pointerId);
      }

      function onPointerMove(e) {
        if (!dragging) return;
        var dy = e.clientY - startY;
        if (Math.abs(dy) > 3) moved = true;
        var h = startH - dy; // dragging up (negative dy) grows the sheet
        h = Math.max(COLLAPSED_H, Math.min(EXPANDED_H, h));
        inner.style.maxHeight = h + 'px';
        updateBodyVisibility(h);
      }

      function onPointerUp(e) {
        if (!dragging) return;
        dragging = false;
        inner.classList.remove('is-dragging');
        inner.style.maxHeight = '';

        if (!moved) {
          // plain tap/click — just toggle
          settle(!sheet.classList.contains('is-collapsed'));
          return;
        }

        var dy = e.clientY - startY;
        var h = Math.max(COLLAPSED_H, Math.min(EXPANDED_H, startH - dy));
        var snapCollapsed = (h - COLLAPSED_H) < (EXPANDED_H - h);
        settle(snapCollapsed);
      }

      peek.addEventListener('pointerdown', onPointerDown);
      peek.addEventListener('pointermove', onPointerMove);
      peek.addEventListener('pointerup', onPointerUp);
      peek.addEventListener('pointercancel', onPointerUp);

      // Exposed so tapping a friend row in the sheet's own scrollable list
      // can collapse it (same smooth settle() used for drag/tap-to-close).
      window.mapSheetControls = {
        collapse: function () { settle(true); }
      };
    })();

    // ===================== Bottom nav: bounce feedback =====================
    // Played on LOAD for whichever icon is aria-current="page" — not on click
    // of a link that navigates away. Clicking a link starts tearing the page
    // down in the same tick the class would be added, so that class sometimes
    // never got a single frame to paint before the page unloaded (the exact
    // "sometimes doesn't bounce" bug). Playing it as an entrance animation on
    // the destination page instead is guaranteed to render every time, since
    // that page isn't about to be replaced by anything.
    (function () {
      var current = document.querySelector('.map-sheet__nav-btn[aria-current="page"]');
      if (current) current.classList.add('nav-bounce');

      // Buttons with no href (this same non-navigating current-page button,
      // or any future same-page action) still get a click-triggered restart —
      // there's no navigation racing it, so the animation is reliable here too.
      document.querySelectorAll('.map-sheet__nav-btn:not([href])').forEach(function (btn) {
        btn.addEventListener('click', function () {
          // remove/reflow/re-add so a rapid re-click always restarts the animation
          btn.classList.remove('nav-bounce');
          void btn.offsetWidth;
          btn.classList.add('nav-bounce');
        });
      });
    })();

    // ===================== Bottom sheet: Courses list =====================
    // Built from the same .map-course-room rects baked into the map SVGs
    // (data-room/data-course/data-time/data-people/data-left-pct/data-top-pct
    // — see the courses-tab background markup above), so this list can never
    // drift out of sync with what's actually clickable on the map. Tapping a
    // row switches to that room's floor if needed, collapses the sheet, and
    // pans + opens its card — the same mechanism as tapping a monster marker
    // (panToMarkerAnimated) then tapping a room square on the map directly.
    (function () {
      // Rows are appended directly into the #sheetCourses panel (not an
      // extra wrapper div) — its CSS gap:36px is calculated precisely for
      // direct .map-course-row children (see the comment above #sheetCourses
      // in map.css); a wrapper div would swallow that gap.
      var listHost = document.getElementById('sheetCourses');
      if (!listHost) return;

      var floorForSvgId = { mapBgGFCourses: 'GF', mapBg1FCourses: '1.F', mapBg2OGCourses: '2.F' };
      var rooms = Array.from(document.querySelectorAll('.map-course-room')).map(function (rect) {
        var svg = rect.closest('svg');
        return {
          floor: floorForSvgId[svg.id] || 'GF',
          room: rect.getAttribute('data-room'),
          course: rect.getAttribute('data-course'),
          time: rect.getAttribute('data-time'),
          people: (rect.getAttribute('data-people') || '').split(',').filter(Boolean),
          leftPct: parseFloat(rect.getAttribute('data-left-pct') || '0'),
          topPct: parseFloat(rect.getAttribute('data-top-pct') || '0')
        };
      }).sort(function (a, b) { return a.room.localeCompare(b.room); });

      listHost.innerHTML = rooms.map(function (r, i) {
        return '<button class="map-course-row" type="button" data-index="' + i + '">' +
          '<span class="map-course-row__name">' + r.course + '</span>' +
          '<span class="map-course-row__room">' + r.room + '</span>' +
        '</button>';
      }).join('');

      listHost.querySelectorAll('.map-course-row').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var room = rooms[parseInt(btn.getAttribute('data-index'), 10)];
          if (!room) return;
          var activeFloor = document.querySelector('.map-floor-toggle').getAttribute('data-active') || 'GF';
          if (room.floor !== activeFloor) {
            var seg = document.querySelector('.map-floor-toggle__seg[data-floor="' + room.floor + '"]');
            if (seg) seg.click(); // reuses all existing floor-switch side effects
          }
          if (window.mapSheetControls && window.mapSheetControls.collapse) window.mapSheetControls.collapse();
          if (window.mapControls && window.mapControls.panToRoomAnimated) {
            window.mapControls.panToRoomAnimated(room.leftPct, room.topPct, function () {
              if (window.mapCourseControls && window.mapCourseControls.open) window.mapCourseControls.open(room);
            }, 500);
          } else if (window.mapCourseControls && window.mapCourseControls.open) {
            window.mapCourseControls.open(room);
          }
        });
      });
    })();
  </script>
  <script src="cursor.js?v=1"></script>
</body>
</html>
