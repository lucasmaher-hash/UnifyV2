<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unify — Timetable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=38">
  <link rel="stylesheet" href="stundenplan.css?v=52">
</head>
<body>
  <div class="phone-stage">
  <div class="phone phone--dark" data-screen="stundenplan">
    <div class="screen sp-screen">

      <!-- ============== STUNDENPLAN TAB (default) ============== -->
      <div class="sp-view" id="view-stundenplan">
        <div class="sp-card">
          <div class="sp-header">
            <div class="sp-header__active sp-header__active--left"></div>
            <button class="sp-header__inactive" data-switch-tab="socials">Socials</button>
          </div>
          <div class="sp-panel sp-panel--pink" id="sp-pink-courses">
            <div class="sp-week">
              <button class="sp-week__arrow sp-week__arrow--prev" aria-label="Previous week"><img src="assets/icon_arrow_week.svg" alt=""></button>
              <span class="sp-week__date">7.3</span>
              <span class="sp-week__till">till</span>
              <span class="sp-week__date sp-week__date--right">13.3</span>
              <button class="sp-week__arrow" aria-label="Next week"><img src="assets/icon_arrow_week.svg" alt=""></button>
            </div>
            <div class="sp-days">
              <span class="sp-day sp-day--active" data-day="montag">m</span>
              <button class="sp-day" type="button" data-day="dienstag">d</button>
              <button class="sp-day" type="button" data-day="mittwoch">m</button>
              <button class="sp-day" type="button" data-day="donnerstag">d</button>
              <button class="sp-day" type="button" data-day="freitag">f</button>
            </div>
          </div>
          <div class="sp-panel sp-panel--cream" id="sp-cream-courses"></div>
          <div class="sp-tab-overlay">
            <img class="sp-tab-overlay__face" src="assets/tab_face_stundenplan.svg" alt="">
            <img class="sp-tab-overlay__pill" src="assets/tab_mouth_stundenplan.svg" alt="">
            <p class="sp-tab-overlay__label">Timetable</p>
          </div>
        </div>

        <div class="sp-friends">
          <div class="sp-search">
            <img class="sp-search__icon" src="assets/icon_search.svg" alt="">
            <p class="sp-search__label">search friends</p>
          </div>
          <div id="sp-friend-list"></div>
        </div>
      </div>

      <!-- ============== SOCIALS TAB (hidden by default) ============== -->
      <div class="sp-view" id="view-socials" hidden>
        <div class="sp-cards-socials">
          <div class="sp-header-group">
            <div class="sp-card sp-card--socials">
              <div class="sp-header">
                <button class="sp-header__inactive sp-header__inactive--left" data-switch-tab="stundenplan">Timetable</button>
                <div class="sp-header__active sp-header__active--right"></div>
              </div>
              <div class="sp-panel sp-panel--pink sp-panel--rounded-all">
                <div class="sp-week">
                  <button class="sp-week__arrow sp-week__arrow--prev" aria-label="Previous week"><img src="assets/icon_arrow_week.svg" alt=""></button>
                  <span class="sp-week__date">7.3</span>
                  <span class="sp-week__till">till</span>
                  <span class="sp-week__date sp-week__date--right">13.3</span>
                  <button class="sp-week__arrow" aria-label="Next week"><img src="assets/icon_arrow_week.svg" alt=""></button>
                </div>
              </div>
              <div class="sp-tab-overlay sp-tab-overlay--socials">
                <img class="sp-tab-overlay__face sp-tab-overlay__face--socials" src="assets/tab_face_socials.svg" alt="">
                <img class="sp-tab-overlay__pill sp-tab-overlay__pill--socials" src="assets/tab_mouth_socials.svg" alt="">
                <p class="sp-tab-overlay__label sp-tab-overlay__label--socials">Socials</p>
              </div>
            </div>

            <div class="sp-search">
              <img class="sp-search__icon" src="assets/icon_search.svg" alt="">
              <p class="sp-search__label">search activities</p>
            </div>
          </div>

          <!-- Activities are rendered per-week by renderSocialsActivities()
               (see script below) from SOCIALS_BY_WEEK, driven by the same
               shared currentWeek/stepWeek() as the Timetable tab. -->
          <div class="sp-activities-list" id="spActivitiesList"></div>
        </div>
      </div>

    </div>

    <!-- BOTTOM NAV (fixed) -->
    <nav class="nav" aria-label="Primary">
      <a class="nav__btn nav__home" href="index.html" aria-label="Home"><img src="assets/icon_home_outline.svg" alt=""></a>
      <button class="nav__btn nav__cal" aria-label="Calendar" aria-current="page"><img src="assets/icon_calendar_filled.svg" alt=""></button>
      <a class="nav__btn nav__pin" href="map.html" aria-label="Map"><img src="assets/icon_pin.svg" alt=""></a>
      <a class="nav__btn nav__star" href="settings.html" aria-label="Settings"><img src="assets/icon_star.svg" alt=""></a>
    </nav>
  </div>
  </div>

  <script>
    // Character figure mapping
    var figureMap = {
      'Greg': 'assets/figur_1.svg?v=2',
      'Anna': 'assets/figur_2.svg?v=2',
      'James': 'assets/figur_3.svg?v=2',
      'Sophia': 'assets/figur_4.svg?v=2',
      'Naomi': 'assets/figur_3.svg?v=2',
      'Michi': 'assets/figur_5.svg?v=2',
      'Konst': 'assets/figur_6.svg?v=2',
      'Zoe': 'assets/figur_4.svg?v=2',
      'Nam': 'assets/figur_7.svg?v=2'
    };

    // Course data for all 5 weekdays. Each course carries a `duration`
    // (minutes) instead of a fixed time string — scheduleFor() below lays
    // every course of the day out back-to-back starting from the week's
    // base start time (pink first, then cream), so times are always
    // chronologically ordered automatically, with no manual bookkeeping if
    // a duration or a course gets added/removed. Room numbers are distinct
    // per course rather than repeating the same one all day.
    var courseData = {
      montag: {
        pink: [
          { title: 'Interface Design', room: '(1.019)', duration: 90, people: ['Sophia', 'James'] },
          { title: 'Math', room: '(2.013)', duration: 90 }
        ],
        cream: [
          { title: 'Ping Pong Duel', room: '(outdoor)', duration: 60, people: ['Anna', 'Konst', 'Zoe', 'Nam'] }
        ]
      },
      dienstag: {
        pink: [
          { title: 'Prototyping', room: '(1.104)', duration: 90 },
          { title: 'ID Fundamentals', room: '(1.019)', duration: 90, people: ['Greg', 'Anna', 'James', 'Sophia', 'Michi'] }
        ],
        cream: [
          { title: 'Movie Night', room: '(0.012)', duration: 120, people: ['Greg', 'Michi'] }
        ]
      },
      mittwoch: {
        pink: [
          { title: 'Clay Modeling', room: '(1.019)', duration: 90 },
          { title: 'CAD Modeling', room: '(1.026)', duration: 90 }
        ],
        cream: []
      },
      donnerstag: {
        pink: [
          { title: 'Ergonomics', room: '(1.031)', duration: 90 }
        ],
        cream: [
          { title: 'Book Club', room: '(0.220)', duration: 90, people: ['Greg', 'Anna', 'James', 'Michi'] }
        ]
      },
      freitag: {
        pink: [
          { title: 'Interface Design', room: '(1.019)', duration: 90 }
        ],
        cream: [
          { title: 'Summer Rave', room: '(2.101)', duration: 120, people: ['Greg', 'Anna', 'James', 'Sophia', 'Naomi', 'Michi', 'Konst', 'Zoe', 'Nam'] }
        ]
      }
    };

    // ---- Week model (matches Figma "select week": 4 weeks, clamped, no loop) ----
    var WEEKS = [
      { start: '7.3',  end: '13.3' },
      { start: '14.3', end: '20.3' },
      { start: '21.3', end: '27.3' },
      { start: '28.3', end: '3.4'  }
    ];
    // Each week shifts the class times a bit...
    var TIME_BY_WEEK = ['09:00-10:30', '10:00-11:30', '11:30-13:00', '08:30-10:00'];
    // ...and swaps a couple of course titles so weeks aren't identical.
    var TITLE_SWAPS = {
      1: { 'Interface Design': 'Design Systems', 'Prototyping': 'Motion Design' },
      2: { 'Math': 'Statistics', 'Clay Modeling': 'Ceramics', 'Ergonomics': 'UX Research' },
      3: { 'Interface Design': 'Portfolio', 'Book Club': 'Writing Workshop', 'Summer Rave': 'Summer Festival' }
    };

    // ---- Socials tab: activities, one list per WEEKS index — mirrors the
    // Timetable side's per-week data so switching weeks (either tab's
    // arrows, wired to the same stepWeek() below) changes what's shown here
    // too, instead of the Socials list being frozen to a single fixed set.
    // Every activity now carries a `day` (one of DAYS below) so joining it
    // (the plus button) can drop it straight into that day's beige/cream
    // section on the Timetable tab — see joinedSocials + the join handler
    // further below. `date` is kept in sync with `day` (both derived from
    // the same Monday-start each week) since a couple of activities used to
    // land on a weekend date with no matching timetable day at all.
    var SOCIALS_BY_WEEK = [
      // Week 0: 7.3 – 13.3 (7.3 = Monday)
      [
        { title: 'Uniparty', time: '20:00-23:00', date: '07.03', day: 'montag', room: 'The Globe', poster: 'assets/poster_umtrunk_uniparty.jpg', color: 'pink', desc: 'The end-of-semester celebration with music, drinks, and good vibes. Bring your friends!', people: ['Greg', 'Anna', 'James', 'Sophia', 'Naomi', 'Michi'] },
        { title: 'Movie Night', time: '19:00-21:30', date: '08.03', day: 'dienstag', room: '0.012', poster: 'assets/poster_movie_night.jpg', color: 'cream', desc: 'Cozy movie night with popcorn and blankets. The film is picked spontaneously.' },
        { title: 'Ted Talk', time: '16:00-17:00', date: '09.03', day: 'mittwoch', room: 'Café', poster: 'assets/poster_ted_talk.jpg', color: 'cream', desc: 'Short talks on exciting topics by students for students, with a Q&A.' },
        { title: 'Book Club', time: '17:00-18:30', date: '10.03', day: 'donnerstag', room: '0.220', poster: 'assets/poster_book_club.jpg', color: 'pink', desc: 'Read, discuss, and swap book recommendations over tea and cookies. New faces welcome.' }
      ],
      // Week 1: 14.3 – 20.3 (14.3 = Monday)
      [
        { title: 'Knitting Competition', time: '14:00-16:00', date: '14.03', day: 'montag', room: 'Studio', poster: 'assets/poster_knitting.jpg', color: 'pink', desc: 'Grab your needles and yarn for a friendly knit-off — prizes for fastest and most creative piece.' },
        { title: 'Soccer Match', time: '18:00-19:30', date: '16.03', day: 'mittwoch', room: 'outdoor', poster: 'assets/poster_soccer.jpg', color: 'cream', desc: 'Campus five-a-side, all skill levels welcome. Cleats optional, enthusiasm mandatory.', people: ['Anna', 'Konst', 'Zoe', 'Nam'] },
        { title: 'Dungeons & Dragons', time: '19:00-22:00', date: '18.03', day: 'freitag', room: 'Mensa', poster: 'assets/poster_dnd.jpg', color: 'pink', desc: 'One-shot campaign for new and returning adventurers — character sheets provided if you don’t have one.' }
      ],
      // Week 2: 21.3 – 27.3 (21.3 = Monday)
      [
        { title: 'Game Jam', time: '10:00-18:00', date: '22.03', day: 'dienstag', room: 'Lab', poster: 'assets/poster_gamejam.jpg', color: 'cream', desc: '48 hours, one theme — build a game from scratch with a team. Snacks and energy drinks provided.', people: ['Greg', 'Sophia', 'Konst'] },
        { title: 'Blender / CAD Workshop', time: '15:00-17:00', date: '25.03', day: 'freitag', room: '1.026', poster: 'assets/poster_blender.jpg', color: 'pink', desc: 'Hands-on 3D modeling session — bring a laptop with Blender installed, beginners welcome.' }
      ],
      // Week 3: 28.3 – 3.4 (28.3 = Monday)
      [
        { title: 'Risk Tournament', time: '18:00-21:00', date: '29.03', day: 'dienstag', room: 'Mensa', poster: 'assets/poster_risk.jpg', color: 'cream', desc: 'World domination, one board at a time. Bracket-style tournament, snacks provided.', people: ['Zoe', 'Nam', 'Michi', 'James'] },
        { title: 'Tequila Party', time: '21:00-01:00', date: '01.04', day: 'freitag', room: 'The Globe', poster: 'assets/poster_tequila.jpg', color: 'pink', desc: 'Saturday night mixer with music and (responsibly-served) tequila. 18+, bring ID.' }
      ]
    ];

    // Activities the user has "joined" from the Socials tab, layered onto
    // the Timetable tab's beige/cream section without touching courseData
    // itself (which is the shared week-to-week template) — keyed by
    // "weekIndex_day" so a join only shows up on the one date it was
    // actually joined for, not on that weekday in every week.
    var joinedSocials = {};
    function joinedKey(weekIndex, day) { return weekIndex + '_' + day; }

    function renderSocialsActivities(weekIndex) {
      var list = document.getElementById('spActivitiesList');
      if (!list) return;
      // Always earliest-first regardless of how SOCIALS_BY_WEEK happens to
      // list them — sorted here (not just hand-ordered in the data) so it
      // stays correct even across a month boundary (date is "DD.MM").
      var acts = (SOCIALS_BY_WEEK[weekIndex] || []).slice().sort(function (a, b) {
        var ap = a.date.split('.'), bp = b.date.split('.');
        return (ap[1] - bp[1]) || (ap[0] - bp[0]);
      });
      list.innerHTML = acts.map(function (a, i) {
        // Same monster-row markup/classes as a timetable course's attendee
        // list (.sp-course__people etc., styled in stundenplan.css) — reused
        // as-is so size, spacing, and layout match exactly. Only some
        // activities carry a `people` list, so this section is optional.
        var peopleHtml = (a.people && a.people.length) ?
          '<div class="sp-course__people">' + a.people.map(function (person) {
            var figureUrl = figureMap[person] || 'assets/figur_1.svg';
            return '<div class="sp-course__person"><span class="sp-course__person-figwrap"><img class="sp-course__person-figure" src="' + figureUrl + '" alt="' + person + '"></span><p class="sp-course__person-name">' + person + '</p></div>';
          }).join('') + '</div>' : '';
        // Reflects joinedSocials so the button stays green/checked across
        // re-renders (switching weeks away and back, re-opening the tab).
        var joined = (joinedSocials[joinedKey(weekIndex, a.day)] || []).some(function (j) { return j.title === a.title; });
        return '<div class="sp-activity sp-activity--' + a.color + (i === 0 ? ' sp-activity--open' : '') + '">' +
            '<div class="sp-activity__content">' +
              '<div class="sp-activity__poster"><img src="' + a.poster + '" alt=""></div>' +
              '<div class="sp-activity__header">' +
                '<div class="sp-activity__titleblock">' +
                  '<p class="sp-activity__title">' + a.title + '</p>' +
                  '<p class="sp-activity__time">' + a.time + '</p>' +
                '</div>' +
                '<p class="sp-activity__date">' + a.date + '</p>' +
              '</div>' +
              '<div class="sp-activity__divider"></div>' +
              '<p class="sp-activity__desc">' + a.desc + '</p>' +
              peopleHtml +
            '</div>' +
            '<div class="sp-activity__face">' +
              '<span class="sp-activity__lip"></span>' +
              '<button class="sp-activity__plus-btn' + (joined ? ' is-joined' : '') + '" type="button" data-index="' + i + '" aria-label="Join activity">' +
                '<img class="sp-activity__plus-icon" src="assets/icon_plus_sp.svg" alt="">' +
                '<img class="sp-activity__check-icon" src="assets/icon_check_sp.svg" alt="">' +
              '</button>' +
            '</div>' +
          '</div>';
      }).join('');

      // Plus buttons are rebuilt on every render, so (re)bind the join
      // toggle here rather than relying on a one-time top-level listener.
      // Joining/un-joining also adds/removes this activity from that day's
      // beige section on the Timetable tab (joinedSocials) and re-renders
      // it — even while the Timetable tab isn't the visible one, same as
      // how week changes already keep both tabs in sync underneath.
      list.querySelectorAll('.sp-activity__plus-btn').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          var a = acts[Number(btn.getAttribute('data-index'))];
          var key = joinedKey(weekIndex, a.day);
          var nowJoined = btn.classList.toggle('is-joined');
          if (!joinedSocials[key]) joinedSocials[key] = [];
          // A couple of activities (Movie Night, Book Club) share a name
          // with a course already baked into that same day's beige section
          // in courseData — joining is a no-op for the injected copy there
          // (nothing to actually add, it's already on the timetable), it
          // just still shows as checked. Everything else adds normally.
          var alreadyOnDay = (courseData[a.day].cream || []).some(function (c) { return c.title === a.title; });
          if (nowJoined) {
            if (!alreadyOnDay) joinedSocials[key].push({ title: a.title, time: a.time, room: a.room, people: a.people });
          } else {
            joinedSocials[key] = joinedSocials[key].filter(function (j) { return j.title !== a.title; });
          }
          if (weekIndex === currentWeek && a.day === currentDay) renderCourses(currentDay);
        });
      });
    }

    var currentWeek = 0;   // 0-based index into WEEKS
    var currentDay = 'montag';
    // Left-to-right order of the day circles — drives both the slide direction
    // and swipe navigation.
    var DAYS = ['montag', 'dienstag', 'mittwoch', 'donnerstag', 'freitag'];

    // Derive a given week's schedule for a day from the base (week-1) data.
    // Every course carries a `duration` (minutes) instead of a fixed time —
    // lay them out back-to-back (pink first, then cream), starting from
    // this week's base start time, so times stay chronologically ordered
    // automatically no matter how courses are added/removed/reordered.
    function scheduleFor(weekIndex, day) {
      var base = courseData[day];
      var swaps = TITLE_SWAPS[weekIndex] || {};

      var startPart = TIME_BY_WEEK[weekIndex].split('-')[0].split(':').map(Number);
      var cursor = startPart[0] * 60 + startPart[1];
      function fmt(mins) {
        var h = Math.floor(mins / 60), m = mins % 60;
        return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
      }
      function mapSequential(c) {
        var start = cursor;
        cursor += c.duration;
        return {
          title: swaps[c.title] || c.title,
          room: c.room,
          time: fmt(start) + '-' + fmt(cursor),
          people: c.people
        };
      }
      return { pink: base.pink.map(mapSequential), cream: base.cream.map(mapSequential) };
    }

    // Update the "7.3 till 13.3" label. Both arrows stay active at all times —
    // the weeks wrap around rather than clamping at the ends. The Socials
    // tab has its own copy of this same header (decorative-looking but
    // wired to the same week state below) — update both so they never
    // fall out of sync with each other.
    function updateWeekLabel() {
      document.querySelectorAll('.sp-week').forEach(function (week) {
        var w = WEEKS[currentWeek];
        week.querySelector('.sp-week__date:not(.sp-week__date--right)').textContent = w.start;
        week.querySelector('.sp-week__date--right').textContent = w.end;
      });
    }

    // Render courses function. `dir` drives the slide-in animation:
    // 1 = new day is to the right (slide in from the right), -1 = from the left,
    // 0/undefined = no animation (initial render, week change).
    function renderCourses(day, dir) {
      currentDay = day;
      var courses = scheduleFor(currentWeek, day);
      // Layer in anything joined from the Socials tab for this exact
      // week+day (see joinedSocials above) — additive only, never mutates
      // courseData/scheduleFor's own output, so it doesn't leak into other
      // weeks that reuse the same base template.
      var joined = joinedSocials[joinedKey(currentWeek, day)] || [];
      if (joined.length) {
        courses = { pink: courses.pink, cream: courses.cream.concat(joined) };
      }
      var pinkContainer = document.getElementById('sp-pink-courses');
      var creamContainer = document.getElementById('sp-cream-courses');

      // Remove all existing courses from pink container (keep first 2 children: week & days)
      var children = pinkContainer.children;
      while (children.length > 2) {
        pinkContainer.removeChild(children[children.length - 1]);
      }

      // Helper function to render a course
      function renderCourse(course) {
        var hasPeople = course.people && course.people.length > 0;
        var courseClass = hasPeople ? 'sp-course sp-course--people' : 'sp-course';
        var courseHtml = '<div class="' + courseClass + '"><div class="sp-course__divider"></div><div class="sp-course__row"><div class="sp-course__title-block"><p class="sp-course__title">' + course.title + '</p><p class="sp-course__title">' + course.room + '</p></div><p class="sp-course__time">' + course.time + '</p></div>';

        // Add people row if course has people
        if (hasPeople) {
          courseHtml += '<div class="sp-course__people">';
          course.people.forEach(function (person) {
            var figureUrl = figureMap[person] || 'assets/figur_1.svg';
            courseHtml += '<div class="sp-course__person"><span class="sp-course__person-figwrap"><img class="sp-course__person-figure" src="' + figureUrl + '" alt="' + person + '"></span><p class="sp-course__person-name">' + person + '</p></div>';
          });
          courseHtml += '</div>';
        }

        courseHtml += '</div>';
        return courseHtml;
      }

      // Add pink courses
      courses.pink.forEach(function (course) {
        pinkContainer.insertAdjacentHTML('beforeend', renderCourse(course));
      });

      // Clear and add cream courses
      creamContainer.innerHTML = '';
      var creamEmpty = courses.cream.length === 0;
      creamContainer.classList.toggle('is-empty', creamEmpty);
      if (creamEmpty) {
        // No cream courses (e.g. Wednesday) — still show a divider line at the
        // top of the beige section so it reads as a proper closing row.
        creamContainer.insertAdjacentHTML('beforeend', '<div class="sp-course__divider"></div>');
      } else {
        courses.cream.forEach(function (course) {
          creamContainer.insertAdjacentHTML('beforeend', renderCourse(course));
        });
      }

      // Courses are re-created on every render, so simply adding the class runs
      // the animation fresh each time — no need to remove/restart it.
      if (dir) {
        var cls = dir > 0 ? 'sp-slide-from-right' : 'sp-slide-from-left';
        var animated = [].slice.call(pinkContainer.querySelectorAll('.sp-course'))
          .concat([].slice.call(creamContainer.children));
        animated.forEach(function (el) { el.classList.add(cls); });
      }
    }

    // Switch to a day, working out the slide direction from the day order.
    function selectDay(day) {
      if (day === currentDay) return;
      var dir = DAYS.indexOf(day) > DAYS.indexOf(currentDay) ? 1 : -1;
      var pink = document.getElementById('sp-pink-courses');
      pink.querySelectorAll('.sp-day').forEach(function (b) {
        b.classList.toggle('sp-day--active', b.getAttribute('data-day') === day);
      });
      renderCourses(day, dir);
    }

    // Step n days from the current one (used by swipe). Clamped, no wraparound.
    function stepDay(delta) {
      var i = DAYS.indexOf(currentDay) + delta;
      if (i < 0 || i >= DAYS.length) return;
      selectDay(DAYS[i]);
    }

    // Scale the phone down so the whole 402×874 frame always fits the window.
    (function () {
      var MARGIN = 40;
      function fit() {
        var s = Math.min(1, (window.innerHeight - MARGIN) / 874, (window.innerWidth - MARGIN) / 402);
        document.documentElement.style.setProperty('--scale', s);
      }
      fit();
      window.addEventListener('resize', fit);
    })();

    // Day + week switching for Timetable
    (function () {
      var pink = document.getElementById('sp-pink-courses');
      var dayButtons = pink.querySelectorAll('.sp-day');
      dayButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {

    window.__onSocialsTabShown = [];

    (function () {

    // rendered dynamically per-week now (see renderSocialsActivities()
    // above), which rebinds this same toggle on every render — there are no
    // static .sp-activity__plus-btn elements left at page-load time for a
    // one-time top-level binding to find.

    // Scroll-driven expand/collapse: purely a function of scroll position
    // (no click-to-toggle — reset from an earlier version that mixed both
    // and let them fight each other). Exactly one activity is open at a
    // time; the open one closes (handing off to the next) once ITS OWN
    // bottom edge scrolls up to the vertical middle of the phone screen.
    //
    // Implemented the same way as index.html's card handoff: geometry is
    // measured once (every card's closed-state top position, plus what its
    // height would be if it were the open one), then each transition point
    // is solved for analytically —
    //   closedTop_k + openHeight_k - middleY = the scrollTop at which card
    //   k's bottom-while-open would exactly reach the middle
    // — rather than re-simulating on every scroll tick. That makes the
    // whole thing a pure function of scrollTop, so scrolling back up
    // reopens each earlier card at exactly the same point it closed.
    (function () {
      var screen = document.querySelector('.sp-screen');
      var phone = document.querySelector('.phone');
      if (!screen || !phone) return;

      // Activities are rebuilt from scratch (fresh DOM nodes) by
      // renderSocialsActivities() every time the week changes, so they're
      // re-queried at the top of every measureAndBind() call below rather
      // than captured once here — a one-time capture would go stale (point
      // at detached nodes) the moment the user steps to another week.
      function currentActivities() {
        return Array.from(document.querySelectorAll('.sp-cards-socials .sp-activity'));
      }

      // The open-state height of each card includes its poster <img>, which
      // is `height:auto` with no width/height attribute — its box is 0 tall
      // until the image file actually finishes downloading. Measuring
      // geometry (below) before that happens silently corrupts every
      // threshold (each one comes out far too small). Wait for every poster
      // to actually be loaded (or fail) before measuring.
      function whenPostersReady(activities, callback) {
        var posterImgs = activities.map(function (a) { return a.querySelector('.sp-activity__poster img'); })
          .filter(Boolean);
        var pending = posterImgs.filter(function (img) { return !img.complete; });
        if (!pending.length) { callback(); return; }
        var remaining = pending.length;
        function done() { if (--remaining <= 0) callback(); }
        pending.forEach(function (img) {
          img.addEventListener('load', done, { once: true });
          img.addEventListener('error', done, { once: true });
        });
      }

      // Geometry can only be measured correctly while the socials view is
      // actually visible — its ancestor is `display:none` (via the [hidden]
      // attribute) until the Socials tab is selected, and everything inside
      // a display:none subtree reads as zero-sized. Since the page can open
      // directly on the Socials tab (?tab=socials) OR the user can switch to
      // it later by clicking the tab button, this whole setup is deferred:
      // it's registered as a callback that stundenplan.html's tab-switch
      // code (above) invokes every time the socials view is actually shown,
      // rather than running once, unconditionally, at page load — which
      // would silently measure a hidden (zero-sized) tree and leave every
      // card stuck if the page didn't happen to open directly on this tab.
      // It's also re-invoked after every week change (see stepWeek() above)
      // since the set of activities/their content can change entirely.
      var scrollBound = false;
      var updateRef = null;
      // Each call gets a token; if a rapid run of week-changes fires several
      // overlapping measureAndBind() calls, an older call's async
      // whenPostersReady callback can resolve AFTER a newer call already
      // finished and bound the scroll listener — without this guard the
      // stale one would win, rebinding against activities from a week that
      // isn't even showing anymore. Only the call matching the latest token
      // is allowed to actually bind.
      var measureToken = 0;

      // ---- auto-scroll used when a new card opens on scroll-down ----
      // The card collapse/expand is a .85s max-height CSS transition (see
      // .sp-activity__content in stundenplan.css). A native
      // scrollTo({behavior:'smooth'}) finishes in ~400ms, so it races ahead
      // and stops while the card above is still collapsing — the new card
      // then keeps drifting up for another ~450ms, which reads as a stutter
      // (fast scroll, then slow drift). Instead we animate scrollTop with
      // the EXACT same duration and easing curve as the collapse, so both
      // move on one identical curve and their combined visual motion is a
      // single smooth glide. (Derivation: the new card's on-screen top is
      // documentTop(t) − scrollTop(t); when both are driven by the same
      // eased (1−ease(t)) curve, that difference reduces to a single eased
      // term → monotonic and smooth.)
      var COLLAPSE_MS = 850;
      // cubic-bezier(.4,0,.2,1) — must match the CSS transition-timing.
      var snapEase = (function () {
        function A(a, b) { return 1 - 3 * b + 3 * a; }
        function B(a, b) { return 3 * b - 6 * a; }
        function C(a) { return 3 * a; }
        function calc(t, a, b) { return ((A(a, b) * t + B(a, b)) * t + C(a)) * t; }
        function slope(t, a, b) { return 3 * A(a, b) * t * t + 2 * B(a, b) * t + C(a); }
        var x1 = 0.4, y1 = 0, x2 = 0.2, y2 = 1;
        return function (x) {
          var t = x;
          for (var i = 0; i < 5; i++) {
            var s = slope(t, x1, x2);
            if (s === 0) break;
            t -= (calc(t, x1, x2) - x) / s;
          }
          return calc(t, y1, y2);
        };
      })();

      var snapRaf = null;
      function cancelSnap() {
        if (snapRaf) { cancelAnimationFrame(snapRaf); snapRaf = null; }
      }
      function animateScrollTo(targetTop) {
        cancelSnap();
        var startTop = screen.scrollTop;
        var dist = targetTop - startTop;
        if (Math.abs(dist) < 1) return;
        var startTime = null;
        function frame(now) {
          if (startTime === null) startTime = now;
          var p = Math.min(1, (now - startTime) / COLLAPSE_MS);
          screen.scrollTop = startTop + dist * snapEase(p);
          snapRaf = p < 1 ? requestAnimationFrame(frame) : null;
        }
        snapRaf = requestAnimationFrame(frame);
      }
      // Any genuine user scroll input cancels the auto-glide immediately, so
      // it can never restrict/fight manual scrolling. (Our own scrollTop
      // writes fire only 'scroll' events, not these, so the animation never
      // cancels itself.)
      ['wheel', 'touchstart', 'pointerdown', 'keydown'].forEach(function (ev) {
        screen.addEventListener(ev, cancelSnap, { passive: true });
      });

      function measureAndBind() {
        var myToken = ++measureToken;
        var activities = currentActivities();
        if (!activities.length) return;
        var contents = activities.map(function (a) { return a.querySelector('.sp-activity__content'); });
        whenPostersReady(activities, function () {
          if (myToken !== measureToken) return;
          // Each card's closed-state height is however tall its poster +
          // gap + header actually render — computed fresh here (rather than
          // hand-measured pixel constants baked into markup) so any poster's
          // aspect ratio, including ones never seen when this was written,
          // sizes itself correctly with zero manual tuning.
          activities.forEach(function (a) {
            var poster = a.querySelector('.sp-activity__poster');
            var header = a.querySelector('.sp-activity__header');
            if (!poster || !header) return;
            var h = poster.getBoundingClientRect().height + 8 + header.getBoundingClientRect().height;
            a.style.setProperty('--closed-h', h + 'px');
          });
          // ---- geometry measurement (transitions disabled so class
          // toggles apply instantly and synchronously, with no visible
          // flicker since nothing is painted between these reads) ----
          // .phone is rendered through transform:scale(var(--scale)) (see
          // styles.css) so it fits whatever window it's in — getBoundingClientRect
          // therefore returns VISUALLY SCALED pixels, while scrollTop/scrollHeight
          // stay logical/unscaled. Comparing the two directly (as this whole
          // scheme does) silently breaks on any window small enough for scale to
          // drop below 1. Fix: pin --scale to 1 for the duration of this
          // synchronous measurement block (nothing paints in between, so there's
          // no visible flash), then restore whatever it actually was.
          var savedScale = document.documentElement.style.getPropertyValue('--scale');
          document.documentElement.style.setProperty('--scale', '1');
          contents.forEach(function (c) { c.style.transition = 'none'; });
          activities.forEach(function (a) { a.classList.remove('sp-activity--open'); });
          void screen.offsetHeight;

          var savedScrollTop = screen.scrollTop;
          screen.scrollTop = 0;
          void screen.offsetHeight;
          var screenRect = screen.getBoundingClientRect();
          var closedTops = activities.map(function (a) {
            return a.getBoundingClientRect().top - screenRect.top;
          });
          var openHeights = activities.map(function (a) {
            a.classList.add('sp-activity--open');
            void a.offsetHeight;
            var h = a.getBoundingClientRect().height;
            a.classList.remove('sp-activity--open');
            void a.offsetHeight;
            return h;
          });
          var middleY = phone.getBoundingClientRect().height / 2;
          contents.forEach(function (c) { c.style.transition = ''; });
          screen.scrollTop = savedScrollTop;
          document.documentElement.style.setProperty('--scale', savedScale);

          // thresholds[k] = scrollTop at which card k closes and card k+1 opens
          var thresholds = [];
          for (var k = 0; k < activities.length - 1; k++) {
            thresholds.push(closedTops[k] + openHeights[k] - middleY);
          }

          function computeOpenIndex() {
            var st = screen.scrollTop;
            var idx = activities.length - 1;
            for (var i = 0; i < thresholds.length; i++) {
              if (st < thresholds[i]) { idx = i; break; }
            }
            return idx;
          }
          function applyOpenIndex(idx) {
            activities.forEach(function (a, i) {
              a.classList.toggle('sp-activity--open', i === idx);
            });
          }

          // Initial sync for this measurement — sets whichever card the
          // current scrollTop already lands on with no snap/animation
          // (there's no "transition" to correct for on a fresh bind/tab
          // switch, only on an actual scroll-driven handoff below).
          var openIndex = computeOpenIndex();
          applyOpenIndex(openIndex);

          function update() {
            var idx = computeOpenIndex();
            if (idx === openIndex) return;
            var movedForward = idx > openIndex;
            openIndex = idx;
            applyOpenIndex(openIndex);
            // Only scrolling DOWN into a later card: collapsing the card
            // above shrinks the content ahead of it, which can leave the
            // newly-opened card already scrolled past its own top — cut off
            // before the user gets a chance to see it. Glide the rest of the
            // way so its top ends up at the viewport top (closedTops is
            // measured with earlier cards closed, which matches the state
            // once the one above has collapsed). animateScrollTo is
            // duration/easing-matched to the collapse (see above) so the two
            // move as one smooth motion, and it self-cancels on any user
            // input so continued manual scrolling is never restricted.
            if (movedForward) animateScrollTo(closedTops[openIndex]);
          }

          // Re-measuring (e.g. the user leaves and returns to this tab)
          // rebinds against a fresh `update` closure over the newly
          // computed thresholds — drop the previous listener first so they
          // don't pile up across repeated tab switches.
          if (scrollBound) screen.removeEventListener('scroll', updateRef);
          updateRef = update;
          screen.addEventListener('scroll', update, { passive: true });
          scrollBound = true;
        });

      // Exposed so stepWeek() (above) can re-run this after re-rendering a
      // new week's activities while the Socials tab is already the visible
      // one (the __onSocialsTabShown hook alone only fires on switching TO
      // the tab, not on content changes while already on it).
      window.__remeasureSocialsScroll = measureAndBind;
    })();

    // ===================== Bottom nav: bounce feedback =====================
    // Played on LOAD for whichever icon is aria-current="page" — not on click
    // of a link that navigates away. Clicking a link starts tearing the page
    // down in the same tick the class would be added, so that class sometimes
    // never got a single frame to paint before the page unloaded (the exact
    // "sometimes doesn't bounce" bug). Playing it as an entrance animation on
    // the destination page instead is guaranteed to render every time, since
    // that page isn't about to be replaced by anything.
    (function () {

      if (current) current.classList.add('nav-bounce');

      document.querySelectorAll('.nav__btn:not([href])').forEach(function (btn) {

    // ===================== Timetable friend icons: splash on tap =====================
    // Tapping a friend's monster in a course's people row turns it into one
    // of the two generic "splat" shapes (exported from Figma's figur
    // component set, "Figur=Splashed 1"/"Splashed 2") for 3 seconds, then
    // reverts. Delegated on document (not attached per-image) since
    // renderCourses() rebuilds these rows on every day/week switch.
    (function () {
      var SPLASHES = ['assets/figur_splash_1.svg', 'assets/figur_splash_2.svg'];
      var FADE_MS = 300; // matches .sp-course__person-figure's CSS transition

      // True overlapping dissolve, not fade-to-nothing-then-fade-in: a clone
      // of the image is stacked exactly on top (via .sp-course__person-figwrap,
      // position:relative) showing the NEW src at opacity 0, then both the
      // clone (0->1) and the original (1->0) animate at once over the same
      // duration, so the old shape visibly dissolves into the new one. Once
      // done, the clone is discarded and the original <img> takes the new
      // src at full opacity — back to a single element, ready for the next tap.

        incoming.src = newSrc;
        incoming.style.opacity = '0';
        wrap.appendChild(incoming);
        void incoming.offsetWidth; // force layout before animating, or the initial opacity:0 won't transition
        incoming.style.transition = 'opacity ' + FADE_MS + 'ms ease';
        incoming.style.opacity = '1';
        img.style.opacity = '0';
        setTimeout(function () {
          // At this instant the overlay (still opaque) is showing exactly
          // what img is about to become — so img must SNAP to opacity:1,
          // not re-animate from 0. Without disabling the transition here,
          // removing the overlay reveals img still sitting at opacity:0,
          // which then fades in AGAIN from scratch: a visible flash to
          // blank right at the handoff.
          img.style.transition = 'none';
          img.src = newSrc;
          img.style.opacity = '1';
          void img.offsetWidth; // commit the instant jump before re-enabling the transition
          img.style.transition = '';
          wrap.removeChild(incoming);
          if (callback) callback();
        }, FADE_MS);
      }

      document.addEventListener('click', function (e) {
        var person = e.target.closest('.sp-course__person');
        if (!person) return;
        var img = person.querySelector('.sp-course__person-figure');
        if (!img || img.dataset.splashing) return;
        var original = img.getAttribute('src');
        img.dataset.splashing = '1';
        crossfade(img, SPLASHES[Math.floor(Math.random() * SPLASHES.length)], function () {
          setTimeout(function () {
            crossfade(img, original, function () {
              delete img.dataset.splashing;
            });
          }, 3000);
        });
      });
    })();
  </script>
  <script src="cursor.js?v=1"></script>
</body>
</html>
